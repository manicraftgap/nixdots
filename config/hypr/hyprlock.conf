$color = rgba(0,0,0,1.0)
$inner_color = rgba(0,0,0,1.0)
$outer_color = rgba(231,233,234,1.0)
$font_color = rgba(231,233,234,1.0)
$check_color = rgba(231,233,234,1.0)

general {
    ignore_empty_input = true
}

background {
    monitor =
    color = $color
    path = ~/nixos-dotfiles/config/swaybg/current/current.png
    blur_passes = 3
    blur_size = 8
    color = rgba(25, 25, 25, 0.5)
}

animations {
    enabled = true
}
label {
    monitor = 
    text = $TIME 
    font_size = 75
    position = 0, 175
    font_family = JetBrainsMono Nerd Font
    halign = center
    valign = center
  }
input-field {
    monitor =
    size = 650, 100
    position = 0, 0
    halign = center
    valign = center

    inner_color = $inner_color
    outer_color = $outer_color
    outline_thickness = 4

    font_family = JetBrainsMono Nerd Font
    font_color = $font_color

    placeholder_text = Enter Password
    check_color = $check_color
    fail_text = <i>$FAIL ($ATTEMPTS)</i>

    rounding = 0
    shadow_passes = 0
    fade_on_empty = false
}

auth {
    fingerprint:enabled = false
}
